<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LP Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-2: #1a1a1a;
            --border: #252525;
            --text: #f0ede6;
            --text-dim: rgba(240, 237, 230, 0.35);
            --text-muted: rgba(240, 237, 230, 0.55);
            --p1: #d4a053;
            --p1-glow: rgba(212, 160, 83, 0.15);
            --p1-surface: #110f0a;
            --p2: #6b9fc3;
            --p2-glow: rgba(107, 159, 195, 0.15);
            --p2-surface: #0a0e11;
            --damage: #c44040;
            --heal: #4a9e6b;
            --key-bg: #1e1e1e;
            --key-active: #2a2a2a;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ─── Top bar ─── */
        .top-bar {
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 16px;
            border-bottom: 1px solid var(--border);
            flex: 0 0 12%;
        }

        .timer-display {
            font-family: 'DM Mono', monospace;
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: 5px;
            color: var(--text-muted);
        }

        .timer-btn {
            border: none;
            border-radius: 16px;
            width: 70px;
            height: 70px;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-muted);
            background: var(--surface-2);
            border: 1px solid var(--border);
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-btn:active { transform: scale(0.92); }

        /* ─── Players ─── */
        .players-row {
            flex: 1;
            display: flex;
            flex-direction: row;
            min-height: 0;
        }

        .player {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: background 0.3s ease;
        }

        .player:active { background: rgba(255,255,255,0.02); }

        .player-1 { background: var(--p1-surface); }
        .player-2 { background: var(--p2-surface); }

        .player-divider {
            width: 1px;
            background: var(--border);
            flex-shrink: 0;
        }

        .player-name {
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 14px;
        }

        .player-1 .player-name { color: var(--p1); }
        .player-2 .player-name { color: var(--p2); }

        .lp-display {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 4px;
            transition: color 0.3s, text-shadow 0.3s;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        @media (min-width: 360px) {
            .lp-display { font-size: 6.5rem; }
        }

        @media (min-width: 400px) {
            .lp-display { font-size: 8rem; }
        }

        .player-1 .lp-display { color: var(--text); text-shadow: 0 0 60px var(--p1-glow); }
        .player-2 .lp-display { color: var(--text); text-shadow: 0 0 60px var(--p2-glow); }

        .lp-display.damage { color: var(--damage) !important; text-shadow: 0 0 40px rgba(196, 64, 64, 0.3) !important; }
        .lp-display.heal { color: var(--heal) !important; text-shadow: 0 0 40px rgba(74, 158, 107, 0.3) !important; }

        .lp-log {
            margin-top: 18px;
            font-family: 'DM Mono', monospace;
            font-size: 1.05rem;
            color: var(--text-dim);
            height: 1.3em;
            letter-spacing: 2px;
            word-spacing: 8px;
        }

        /* ─── Bottom bar ─── */
        .bottom-bar {
            background: var(--surface);
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid var(--border);
            flex: 0 0 16%;
        }

        .bottom-btn {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 4px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-muted);
            background: var(--surface-2);
            transition: transform 0.1s;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .bottom-btn .btn-icon {
            font-size: 1.8rem;
            line-height: 1;
        }

        .bottom-btn-small {
            font-size: 0.85rem;
            flex-direction: column;
            gap: 2px;
        }

        .bottom-btn-small .btn-icon {
            font-size: 1.2rem;
        }

        .bottom-btn:active { transform: scale(0.95); background: var(--key-active); }

        /* ─── Calculator overlay ─── */
        .calc-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .calc-overlay.active { display: flex; opacity: 1; }

        .calc-close-x {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 58px;
            height: 58px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface-2);
            color: var(--text-muted);
            font-size: 1.8rem;
            font-weight: 300;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: transform 0.1s;
        }
        .calc-close-x:active { transform: scale(0.9); background: var(--key-active); }

        .calc-display-area {
            padding: 20px 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .calc-player-label {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 6px;
        }

        .calc-overlay.p1 .calc-player-label { color: var(--p1); }
        .calc-overlay.p2 .calc-player-label { color: var(--p2); }

        .calc-current-lp {
            font-family: 'DM Mono', monospace;
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .calc-input-display {
            font-size: 4.5rem;
            font-weight: 900;
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: 4px;
        }

        .calc-typed { color: var(--text); }
        .calc-ghost { color: rgba(255,255,255,0.12); }

        .calc-grid-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 7px;
            min-height: 0;
        }

        .calc-row {
            flex: 1;
            display: flex;
            gap: 7px;
            min-height: 0;
        }

        .calc-key {
            flex: 1;
            border: none;
            border-radius: var(--radius);
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text);
            background: var(--key-bg);
            transition: transform 0.08s, background 0.08s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calc-key:active {
            transform: scale(0.95);
            background: var(--key-active);
        }

        .calc-key-util {
            color: var(--text-muted);
            background: var(--surface);
            font-size: 1.5rem;
        }

        .calc-key-minus {
            background: var(--damage);
            color: #fff;
            font-size: 2.6rem;
            font-weight: 800;
        }
        .calc-key-minus:active { background: #a33535; }

        .calc-key-plus {
            background: var(--heal);
            color: #fff;
            font-size: 2.6rem;
            font-weight: 800;
        }
        .calc-key-plus:active { background: #3d8559; }

        .calc-key-halve {
            background: rgba(140, 120, 180, 0.25);
            color: var(--text-muted);
            font-size: 1.6rem;
            font-weight: 700;
        }
        .calc-key-halve:active { background: rgba(140, 120, 180, 0.35); }

        /* ─── Confirm overlay ─── */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .confirm-overlay.active { display: flex; }

        .confirm-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px 28px;
            text-align: center;
            max-width: 320px;
            width: 85%;
        }

        .confirm-box p {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 28px;
            color: var(--text);
            line-height: 1.4;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
        }

        .confirm-btn {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .confirm-btn:active { transform: scale(0.95); }

        .confirm-btn-cancel {
            background: var(--surface-2);
            color: var(--text-muted);
        }

        .confirm-btn-ok {
            background: var(--damage);
            color: #fff;
        }
        .confirm-btn-ok:active { background: #a33535; }

        /* ─── Dice overlay ─── */
        .dice-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.94);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 28px;
        }

        .dice-overlay.active { display: flex; }

        .dice-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text-dim);
        }

        .dice-face {
            width: 140px;
            height: 140px;
            background: var(--text);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dice-face span {
            font-size: 5rem;
            color: var(--bg);
            font-weight: 900;
        }

        @keyframes diceRoll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(0.8); }
            50% { transform: rotate(180deg) scale(1.1); }
            75% { transform: rotate(270deg) scale(0.9); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .dice-face.rolling { animation: diceRoll 0.4s ease-in-out; }

        .dice-btn {
            border: none;
            border-radius: 10px;
            padding: 14px 32px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text);
            background: var(--surface-2);
            border: 1px solid var(--border);
            letter-spacing: 1px;
        }

        .dice-btn:active { transform: scale(0.93); }

        .dice-close {
            padding: 12px 32px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ─── Landscape ─── */
        @media (orientation: landscape) {
            .lp-display { font-size: 4rem; }
            .player-name { font-size: 0.65rem; margin-bottom: 6px; }
            .lp-log { margin-top: 8px; font-size: 0.65rem; }

            .top-bar { padding: 6px 16px; }
            .timer-display { font-size: 1.1rem; }
            .timer-btn { width: 32px; height: 32px; font-size: 0.75rem; }

            .bottom-bar { padding: 6px 10px; gap: 6px; grid-template-columns: 1fr 1fr 1fr 1fr; }
            .bottom-btn { padding: 14px 6px; font-size: 0.85rem; }
            .bottom-btn .btn-icon { font-size: 1.1rem; }

            .calc-overlay { flex-direction: row; }

            .calc-display-area {
                flex: 0 0 38%;
                border-right: 1px solid var(--border);
                padding: 24px;
                justify-content: center;
            }

            .calc-close-x { top: 10px; left: 10px; width: 46px; height: 46px; font-size: 1.4rem; }

            .calc-grid-section {
                flex: 1;
                display: flex;
                flex-direction: column;
            }

            .calc-grid-wrap { flex: 1; }

            .calc-key { font-size: 1.5rem; }
            .calc-key-minus, .calc-key-plus { font-size: 1.8rem; }

            .dice-face { width: 110px; height: 110px; }
            .dice-face span { font-size: 4rem; }
            .dice-overlay { gap: 16px; }
        }

        @media (orientation: portrait) {
            .calc-grid-section { display: contents; }
        }
    </style>
</head>
<body>

<!-- Top bar: Timer -->
<div class="top-bar">
    <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">&#9654;</button>
    <div class="timer-display" id="timerDisplay">00:00</div>
</div>

<!-- Players -->
<div class="players-row">
    <div class="player player-1" onclick="openCalc(1)">
        <div class="player-name">Giocatore 1</div>
        <div class="lp-display" id="lp1">8000</div>
        <div class="lp-log" id="log1"></div>
    </div>
    <div class="player-divider"></div>
    <div class="player player-2" onclick="openCalc(2)">
        <div class="player-name">Giocatore 2</div>
        <div class="lp-display" id="lp2">8000</div>
        <div class="lp-log" id="log2"></div>
    </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
    <button class="bottom-btn" onclick="rollDice()"><span class="btn-icon">&#127922;</span> Dado</button>
    <button class="bottom-btn" id="undoBtn" onclick="undo()"><span class="btn-icon">&#8630;</span> Undo</button>
    <button class="bottom-btn bottom-btn-small" onclick="confirmReset(false)"><span class="btn-icon">&#8635;</span>Reset LP</button>
    <button class="bottom-btn bottom-btn-small" onclick="confirmReset(true)"><span class="btn-icon">&#10005;</span>Reset Match</button>
</div>

<!-- Calculator overlay (fullscreen) -->
<div class="calc-overlay" id="calcOverlay">
    <button class="calc-close-x" onclick="closeCalc()">&#10005;</button>

    <!-- Display area -->
    <div class="calc-display-area">
        <div class="calc-player-label" id="calcHeader">Giocatore 1</div>
        <div class="calc-current-lp" id="calcCurrentLP">LP: 8000</div>
        <div class="calc-input-display" id="calcDisplay">
            <span class="calc-typed"></span><span class="calc-ghost">000</span>
        </div>
    </div>

    <!-- Grid section (fills remaining space) -->
    <div class="calc-grid-section">
        <div class="calc-grid-wrap">
            <div class="calc-row">
                <button class="calc-key" onclick="calcPress('1')">1</button>
                <button class="calc-key" onclick="calcPress('2')">2</button>
                <button class="calc-key" onclick="calcPress('3')">3</button>
            </div>
            <div class="calc-row">
                <button class="calc-key" onclick="calcPress('4')">4</button>
                <button class="calc-key" onclick="calcPress('5')">5</button>
                <button class="calc-key" onclick="calcPress('6')">6</button>
            </div>
            <div class="calc-row">
                <button class="calc-key" onclick="calcPress('7')">7</button>
                <button class="calc-key" onclick="calcPress('8')">8</button>
                <button class="calc-key" onclick="calcPress('9')">9</button>
            </div>
            <div class="calc-row">
                <button class="calc-key calc-key-util" onclick="calcBack()">&#9003;</button>
                <button class="calc-key" onclick="calcPress('0')">0</button>
                <button class="calc-key calc-key-util" onclick="calcClear()">C</button>
            </div>
            <div class="calc-row">
                <button class="calc-key calc-key-minus" onclick="calcApply(-1)">&#8722;</button>
                <button class="calc-key calc-key-plus" onclick="calcApply(1)">+</button>
                <button class="calc-key calc-key-halve" onclick="calcHalve()">&divide;2</button>
            </div>
        </div>
    </div>
</div>

<!-- Dice overlay -->
<div class="dice-overlay" id="diceOverlay">
    <div class="dice-label">Dado D6</div>
    <div class="dice-face" id="diceFace"><span id="diceValue">?</span></div>
    <button class="dice-btn" onclick="rollDice()">Ritira</button>
    <button class="dice-close" onclick="closeDice()">Chiudi</button>
</div>

<!-- Confirm overlay -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <p id="confirmText">Sei sicuro?</p>
        <div class="confirm-buttons">
            <button class="confirm-btn confirm-btn-cancel" onclick="closeConfirm()">Annulla</button>
            <button class="confirm-btn confirm-btn-ok" id="confirmOk">Conferma</button>
        </div>
    </div>
</div>

<script>
    const START_LP = 8000;
    let lp = { 1: START_LP, 2: START_LP };
    let logs = { 1: [], 2: [] };
    let timerInterval = null;
    let timerSeconds = 0;
    let timerRunning = false;
    let history = [];
    let calcPlayer = null;
    let calcInput = '';

    function updateDisplay(player) {
        document.getElementById('lp' + player).textContent = lp[player];
    }

    function animateLP(player, from, to, type) {
        const el = document.getElementById('lp' + player);
        const duration = 800;
        const startTime = performance.now();
        const diff = to - from;

        el.classList.add(type);

        function tick(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            // ease-out cubic
            const ease = 1 - Math.pow(1 - progress, 3);
            const current = Math.round(from + diff * ease);
            el.textContent = Math.max(0, current);
            if (progress < 1) {
                requestAnimationFrame(tick);
            } else {
                el.textContent = to;
                setTimeout(() => el.classList.remove(type), 300);
            }
        }
        requestAnimationFrame(tick);
    }

    function flashLP(player, type) {
        const el = document.getElementById('lp' + player);
        el.classList.add(type);
        setTimeout(() => el.classList.remove(type), 400);
    }

    function addLog(player, amount) {
        const sign = amount > 0 ? '+' : '';
        logs[player].unshift(sign + amount);
        if (logs[player].length > 3) logs[player].pop();
        document.getElementById('log' + player).textContent = logs[player].join('   ')
;
    }

    function changeLP(player, amount) {
        history.push({ player: player, amount: amount, lpBefore: lp[player] });
        lp[player] = Math.max(0, lp[player] + amount);
        updateDisplay(player);
        flashLP(player, amount > 0 ? 'heal' : 'damage');
        addLog(player, amount);
    }

    function undo() {
        if (history.length === 0) return;
        const last = history.pop();
        lp[last.player] = last.lpBefore;
        updateDisplay(last.player);
        logs[last.player].shift();
        document.getElementById('log' + last.player).textContent = logs[last.player].join('  ');
        flashLP(last.player, 'heal');
        if (calcPlayer === last.player) {
            syncCalcLP();
        }
    }

    function getCalcValue() {
        if (!calcInput) return 0;
        const num = parseInt(calcInput, 10);
        if (calcInput.length <= 2) return num * 100;
        return num;
    }

    function updateCalcDisplay() {
        const d = document.getElementById('calcDisplay');
        const typed = d.querySelector('.calc-typed');
        const ghost = d.querySelector('.calc-ghost');

        if (!calcInput) {
            typed.textContent = '';
            ghost.textContent = '000';
        } else if (calcInput.length <= 2) {
            typed.textContent = calcInput;
            ghost.textContent = '00';
        } else {
            typed.textContent = calcInput;
            ghost.textContent = '';
        }
    }

    function syncCalcLP() {
        document.getElementById('calcCurrentLP').textContent = 'LP: ' + lp[calcPlayer];
    }

    function openCalc(player) {
        calcPlayer = player;
        calcInput = '';
        document.getElementById('calcHeader').textContent = 'Giocatore ' + player;
        syncCalcLP();
        updateCalcDisplay();

        const overlay = document.getElementById('calcOverlay');
        overlay.classList.remove('p1', 'p2');
        overlay.classList.add('p' + player);
        overlay.classList.add('active');
    }

    function closeCalc() {
        document.getElementById('calcOverlay').classList.remove('active');
        calcPlayer = null;
        calcInput = '';
    }

    function calcPress(digit) {
        if (calcInput.length >= 5) return;
        if (calcInput === '' && digit === '0') return;
        calcInput += digit;
        updateCalcDisplay();
    }

    function calcBack() {
        calcInput = calcInput.slice(0, -1);
        updateCalcDisplay();
    }

    function calcClear() {
        calcInput = '';
        updateCalcDisplay();
    }

    function calcHalve() {
        const player = calcPlayer;
        const lpBefore = lp[player];
        const newLP = Math.floor(lpBefore / 2);
        const amount = newLP - lpBefore;

        history.push({ player: player, amount: amount, lpBefore: lpBefore });
        lp[player] = newLP;
        addLog(player, amount);

        document.getElementById('calcOverlay').classList.remove('active');
        calcPlayer = null;
        calcInput = '';

        animateLP(player, lpBefore, newLP, 'damage');
    }

    function calcApply(sign) {
        const val = getCalcValue();
        if (!val) return;
        const amount = val * sign;
        const player = calcPlayer;
        const lpBefore = lp[player];

        // Apply LP change (without visual update yet)
        history.push({ player: player, amount: amount, lpBefore: lpBefore });
        lp[player] = Math.max(0, lp[player] + amount);
        addLog(player, amount);

        // Close calculator
        document.getElementById('calcOverlay').classList.remove('active');
        calcPlayer = null;
        calcInput = '';

        // Animate the number counting on main screen
        const type = amount > 0 ? 'heal' : 'damage';
        animateLP(player, lpBefore, lp[player], type);
    }

    document.addEventListener('keydown', function(e) {
        if (!document.getElementById('calcOverlay').classList.contains('active')) return;
        if (e.key >= '0' && e.key <= '9') calcPress(e.key);
        else if (e.key === 'Backspace') calcBack();
        else if (e.key === 'Enter') calcApply(-1);
        else if (e.key === 'Escape') closeCalc();
        else if (e.key === '+') calcApply(1);
        else if (e.key === '-') calcApply(-1);
    });

    function toggleTimer() {
        if (timerRunning) {
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById('timerBtn').innerHTML = '&#9654;';
        } else {
            timerRunning = true;
            document.getElementById('timerBtn').innerHTML = '&#9646;&#9646;';
            timerInterval = setInterval(() => {
                timerSeconds++;
                updateTimerDisplay();
            }, 1000);
        }
    }

    function updateTimerDisplay() {
        const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
        const s = String(timerSeconds % 60).padStart(2, '0');
        document.getElementById('timerDisplay').textContent = m + ':' + s;
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerRunning = false;
        timerSeconds = 0;
        updateTimerDisplay();
        document.getElementById('timerBtn').innerHTML = '&#9654;';
    }

    function confirmReset(includeTimer) {
        const msg = includeTimer ? 'Resettare la partita?' : 'Resettare i Life Points?';
        document.getElementById('confirmText').textContent = msg;
        const okBtn = document.getElementById('confirmOk');
        okBtn.onclick = function() {
            closeConfirm();
            resetGame(includeTimer);
        };
        document.getElementById('confirmOverlay').classList.add('active');
    }

    function closeConfirm() {
        document.getElementById('confirmOverlay').classList.remove('active');
    }

    function resetGame(includeTimer) {
        lp[1] = START_LP;
        lp[2] = START_LP;
        logs = { 1: [], 2: [] };
        history = [];
        updateDisplay(1);
        updateDisplay(2);
        document.getElementById('log1').textContent = '';
        document.getElementById('log2').textContent = '';
        if (includeTimer) resetTimer();
    }

    function rollDice() {
        const overlay = document.getElementById('diceOverlay');
        const face = document.getElementById('diceFace');
        const val = document.getElementById('diceValue');
        overlay.classList.add('active');
        face.classList.remove('rolling');
        void face.offsetWidth;
        face.classList.add('rolling');
        val.textContent = '?';
        let rolls = 0;
        const interval = setInterval(() => {
            val.textContent = Math.floor(Math.random() * 6) + 1;
            rolls++;
            if (rolls > 8) {
                clearInterval(interval);
                val.textContent = Math.floor(Math.random() * 6) + 1;
            }
        }, 60);
    }

    function closeDice() {
        document.getElementById('diceOverlay').classList.remove('active');
    }
</script>

</body>
</html>
