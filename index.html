<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LP Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Top bar: Timer -->
<div class="top-bar">
    <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">&#9654;</button>
    <div class="timer-display" id="timerDisplay">00:00</div>
</div>

<!-- Players -->
<div class="players-row">
    <div class="player player-1" onclick="openCalc(1)">
        <div class="player-name">Giocatore 1</div>
        <div class="lp-display" id="lp1">8000</div>
        <div class="lp-log" id="log1"></div>
    </div>
    <div class="player-divider"></div>
    <div class="player player-2" onclick="openCalc(2)">
        <div class="player-name">Giocatore 2</div>
        <div class="lp-display" id="lp2">8000</div>
        <div class="lp-log" id="log2"></div>
    </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
    <button class="bottom-btn" onclick="rollDice()">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="4"/><circle cx="8" cy="8" r="1.2" fill="currentColor"/><circle cx="16" cy="8" r="1.2" fill="currentColor"/><circle cx="8" cy="16" r="1.2" fill="currentColor"/><circle cx="16" cy="16" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/></svg>
        Dado
    </button>
    <button class="bottom-btn" id="undoBtn" onclick="undo()">
        <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
        Undo
    </button>
    <button class="bottom-btn bottom-btn-small" onclick="confirmReset(false)">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><path d="M22 2v4h-4"/></svg>
        Reset LP
    </button>
    <button class="bottom-btn bottom-btn-small" onclick="confirmReset(true)">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="m9 10 6 4"/><path d="m15 10-6 4"/></svg>
        Reset Match
    </button>
</div>

<!-- Calculator overlay (fullscreen) -->
<div class="calc-overlay" id="calcOverlay">
    <button class="calc-close-x" onclick="closeCalc()">&#10005;</button>

    <!-- Display area -->
    <div class="calc-display-area">
        <div class="calc-player-label" id="calcHeader">Giocatore 1</div>
        <div class="calc-current-lp" id="calcCurrentLP">LP: 8000</div>
        <div class="calc-input-display" id="calcDisplay">
            <span class="calc-typed"></span><span class="calc-ghost">000</span>
        </div>
    </div>

    <!-- Grid section (fills remaining space) -->
    <div class="calc-grid-section">
        <div class="calc-grid-wrap">
            <div class="calc-row">
                <button class="calc-key" onclick="calcPress('1')">1</button>
                <button class="calc-key" onclick="calcPress('2')">2</button>
                <button class="calc-key" onclick="calcPress('3')">3</button>
            </div>
            <div class="calc-row">
                <button class="calc-key" onclick="calcPress('4')">4</button>
                <button class="calc-key" onclick="calcPress('5')">5</button>
                <button class="calc-key" onclick="calcPress('6')">6</button>
            </div>
            <div class="calc-row">
                <button class="calc-key" onclick="calcPress('7')">7</button>
                <button class="calc-key" onclick="calcPress('8')">8</button>
                <button class="calc-key" onclick="calcPress('9')">9</button>
            </div>
            <div class="calc-row">
                <button class="calc-key calc-key-util" onclick="calcBack()">&#9003;</button>
                <button class="calc-key" onclick="calcPress('0')">0</button>
                <button class="calc-key calc-key-util" onclick="calcClear()">C</button>
            </div>
            <div class="calc-row">
                <button class="calc-key calc-key-minus" onclick="calcApply(-1)">&#8722;</button>
                <button class="calc-key calc-key-plus" onclick="calcApply(1)">+</button>
                <button class="calc-key calc-key-halve" onclick="calcHalve()">&divide;2</button>
            </div>
        </div>
    </div>
</div>

<!-- Dice overlay -->
<div class="dice-overlay" id="diceOverlay">
    <div class="dice-label">Dado D6</div>
    <div class="dice-face" id="diceFace"><span id="diceValue">?</span></div>
    <button class="dice-btn" onclick="rollDice()">Ritira</button>
    <button class="dice-close" onclick="closeDice()">Chiudi</button>
</div>

<!-- Confirm overlay -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <p id="confirmText">Sei sicuro?</p>
        <div class="confirm-buttons">
            <button class="confirm-btn confirm-btn-cancel" onclick="closeConfirm()">Annulla</button>
            <button class="confirm-btn confirm-btn-ok" id="confirmOk">Conferma</button>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
